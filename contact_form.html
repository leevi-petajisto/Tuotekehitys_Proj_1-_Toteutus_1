    <main class="tilauslomake">
        <div class="kortti">
            <form>
                <h1 class="listtitle">Tilaa siivous</h1>
                <p class="forminfo">
                    Tilaa siivous täyttämällä alla olevat yhteystiedot. Otamme teihin yhteyttä mahdollisimman pian.
                </p>
                <ul class="listtyle">
                    <li>
                        <label class="listname" for="nimi">Nimi</label>
                        <input class="input" type="text" id="nimi" name="nimi" placeholder="*Pakollinen kenttä" required>
                    </li>
                    <li>
                        <label class="listname" for="puhnro">Puhelinnumero</label>
                        <input class="input" type="text" id="puhnro" name="puhelinumero" placeholder="*Pakollinen kenttä" required>
                    </li>
                    <li>
                        <label class="listname" for="email">Sähköposti</label>
                        <input class="input" type="text" id="email" name="sähköposti" placeholder="*Pakollinen kenttä" required>
                    </li>
                    <li>
                        <button class="nappi">Tilaa</button>
                    </li>
                </ul>
            </form>
        </div>
        
    </main>
